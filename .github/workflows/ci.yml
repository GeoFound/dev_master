name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Compile Python
        run: python -m compileall runtime_engine bin tests

      - name: Run tests
        run: python -m unittest discover tests

      - name: Validate runtime JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path("runtime").rglob("*.json")):
              json.loads(path.read_text(encoding="utf-8"))
              print(path)
          PY

      - name: Ruff lint
        run: ruff check runtime_engine bin tests

      - name: Ruff format check
        run: ruff format --check runtime_engine bin tests

      - name: Mypy strict
        run: mypy runtime_engine bin
